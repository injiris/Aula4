<!DOCTYPE html>

    <title>Exemplo 1</title>
    <script>
      let a = "carro";
      var b = 1;
      const c = "casa";

      function buttonClick() {
        alert("função js");

      function attTexto() {
        let input = document.getElementById("meuinput");
        let p = document.getElementById("para");

        p.textContent = input.value;

        console.log("oi")
      }
    </script>
  </head>

  <body>
    <h1>Hello, world</h1>

    <p id="para">paragrafo</p>

    <a href="https://google.com">Google</a>

    <input id="meuinput" type="text" oninput="attTexto()" />
    <select>

    </select>

    <button onclick="buttonClick()">botão</button>
