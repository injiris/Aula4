<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exemplo 1</title>
    <script>
      let a = "carro";
      var b = 1;
      const c = "casa";

      function buttonClick() {
        alert("função js");
      }

      function attTexto() {
        let input = document.getElementById("meuinput");
        let p = document.getElementById("para");

        p.textContent = input.value;

        console.log("oi");
      }
    </script>

    <style>
      body {
        background-color: #eee;
      }

      h1 {
        font-family: Tahoma;
        color: gray;
        font-size: 32px;
      }

      p {
        text-align: center;
      }

      img {
        max-width: 100%;
        border: solid 1px black;
        padding: 2px;
        margin-top: 10px;
        margin-bottom: 10px;
      }

      .margem-minima {
        margin-top: 10px;
        margin-bottom: 10px;
      }

      .margem-minima input,
      .margem-minima select,
      .margem-minima button {
        width: 50vw;
      }
    </style>
  </head>

  <body>
    <div>
      <h1>Hello, world</h1>
      <h5>teste h5</h5>
      <p id="para">paragrafo</p>
      <span>texto solto na pagina: span</span>
    </div>
    <img src="img.png" alt="gatinho" />
    <div class="margem-minima">
      <a href="https://google.com">Google</a>
    </div>

    <div class="margem-minima">
      <input id="meuinput" type="text" oninput="attTexto()" />
    </div>

    <div class="margem-minima">
      <select>
        <option>1</option>
        <option>2</option>
        <option>3</option>
      </select>
    </div>

    <div class="margem-minima">
      <button onclick="buttonClick()">botão</button>
    </div>
  </body>
</html>
