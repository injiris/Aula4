<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desafio 2</title>

    <style>
      body {
        margin: 0;
      }
      .div1 {
        text-align: center;
        height: 25vh;
        background-color: red;
      }

      .div2 {
        text-align: left;
        height: 25vh;
        background-color: orange;
      }

      #div3 {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }

      #div3 div {
        height: 12vh;
      }

      #div3 div.info1 {
        background-color: yellow;
      }
      #div3 div.info2 {
        background-color: green;
        display: flex;
        align-items: center;
      }

      #div4 {
        display: flex;
        flex-direction: row;
      }

      #div4 div {
        height: 12vh;
      }

      #div4 div.info3 {
        background-color: blue;
        width: 50%;
      }
      #div4 div.info4 {
        background-color: purple;
        width: 50%;
        display: flex;
      }
    </style>
  </head>
  <body>
    <div class="div1">Div 1</div>

    <div class="div2">Div 2</div>

    <div id="div3">
      <div class="info1">info 1</div>
      <div class="info2">info 2</div>
    </div>

    <div id="div4">
      <div class="info3">info 3</div>
      <div class="info4">info 4</div>
    </div>
  </body>
</html>
